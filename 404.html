<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>404 - 未找到</title>
<style>
body { font-family: "Courier New", monospace; background: #171b1e; color: #96a09d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
h1 { font-size: 48px; color: #5a6a62; font-weight: normal; letter-spacing: 6px; }
p { font-size: 14px; color: #6a7a72; }
a { color: #8aa99a; }
</style>
<script>
(function() {
  var path = location.pathname.replace(/\/+$/, '');
  var as = path.indexOf('/assets/');
  // 优先用 assets 目录，否则用仓库根目录
  var base = location.origin + (as >= 0 ? path.substring(0, as + 7) : path.split('/').slice(0, 2).join('/') + '/');

  // 解析出根目录和 assets 目录
  var root = location.origin + path.split('/').slice(0, 2).join('/') + '/';
  var assetBase = root + 'assets/';

  if (path.endsWith('/collect')) {
    location.replace(assetBase + 'emith-search.html#/collect');
    return;
  } else if (path.endsWith('/sujianwei')) {
    location.replace(assetBase + 'profile-sjw-74.html');
    return;
  }
  // 显示 404 信息
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('path').textContent = location.href;
  });
})();
</script>
<link rel="stylesheet" href="assets/mobile-fix.css">
<script src="assets/mobile-fix.js" defer></script>
</head>
<body>
  <h1>404</h1>
  <p>页面未找到</p>
  <p id="path" style="color:#5a6a62;font-size:11px;"></p>
  <p><a href="javascript:history.back()">返回</a> · <a href="index.html">回到首页</a></p>
</body>
</html>

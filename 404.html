<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳转中...</title>
<script>
(function() {
  var path = location.pathname.replace(/\/+$/, '');
  var searchBase = location.origin + location.pathname.substring(0, path.lastIndexOf('/') + 1);

  if (path.endsWith('/collect')) {
    location.replace(searchBase + 'emith-search.html#/collect');
  } else if (path.endsWith('/sujianwei')) {
    location.replace(searchBase + 'emith-search.html#/sujianwei');
  }
  // 其他 404 不做特殊处理
})();
</script>
</head>
<body>
<p>页面未找到，正在跳转...</p>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第7次</title>
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; background: #182024; color: #d6dfda; font-family: "Courier New", "Microsoft YaHei", monospace; }
body { padding: 18px; }
.map-shell { height: 100%; border: 1px solid #405159; border-radius: 7px; background: #1d272b; padding: 16px; box-shadow: inset 0 0 60px rgba(0,0,0,.24); }
.title { height: 34px; color: #9eb0aa; font-size: 14px; letter-spacing: 4px; }
.map { position: relative; height: calc(100% - 34px); overflow: hidden; border: 1px solid rgba(118,152,146,.22); border-radius: 6px; background: rgba(15,22,25,.56); }
.line { position: absolute; height: 1px; background: #5f9377; transform-origin: 0 0; pointer-events: none; opacity: .82; }
.node { position: absolute; width: 40px; height: 40px; transform: translate(-50%,-50%); border: 1px solid #4f8066; border-radius: 50%; background: #20352f; color: #9bd8bd; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: border-color .3s ease,background .3s ease,color .3s ease,box-shadow .3s ease; }
.node:hover { border-color: #7ed3b2; background: #25483d; box-shadow: 0 0 20px rgba(126,211,178,.18); }
.label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); white-space: nowrap; color: #a0aaa5; font-size: 10px; letter-spacing: .5px; }
.node.prefecture { border-width: 2px; }
.result { position: absolute; left: 18px; bottom: 16px; min-width: 190px; border-left: 2px solid #6fa18f; background: rgba(28,39,43,.92); padding: 10px 13px; color: #cbd8d3; font-size: 12px; opacity: 0; transform: translateY(5px); transition: .2s; pointer-events: none; }
.result.show { opacity: 1; transform: translateY(0); }

@media (max-width: 640px) {
  body { padding: 10px 8px; font-size: 13px; }
  img { max-width: 100%; height: auto; }
  .wrap, .page, .content, .main { width: 100%; }
}
</style>
<link rel="stylesheet" href="mobile-fix.css">
</head>
<body>
<div class="map-shell">
  <div class="title">// 第7次 //</div>
  <div class="map" id="map">
    <div class="result" id="result"></div>
  </div>
</div>
<script>
const nodes = [
  { id:7,  x:10,y:74,label:'宜阳' },
  { id:12, x:18,y:66,label:'肥东' },
  { id:19, x:30,y:76,label:'余姚' },
  { id:2,  x:44,y:64,label:'枣阳' },
  { id:20, x:56,y:70,label:'南京',prefecture:true },
  { id:11, x:70,y:66,label:'卡**特',prefecture:true },
  { id:4,  x:86,y:72,label:'南京',prefecture:true },
  { id:21, x:84,y:44,label:'柴桑' },
  { id:8,  x:72,y:34,label:'茂名',prefecture:true },
  { id:14, x:60,y:50,label:'邛崃' },
  { id:9,  x:46,y:40,label:'绩溪' },
  { id:1,  x:34,y:48,label:'绍兴',prefecture:true },
  { id:10, x:22,y:32,label:'韩城' },
  { id:16, x:8, y:42,label:'咸阳',prefecture:true },
  { id:15, x:10,y:20,label:'???',hidden:true,prefecture:true }
];
const connections = nodes.slice(0,-1).map((node,index) => [node.id,nodes[index+1].id]);
const map = document.getElementById('map');
const result = document.getElementById('result');
function line(a,b,w,h) {
  const x1=(a.x/100)*w, y1=(a.y/100)*h;
  const x2=(b.x/100)*w, y2=(b.y/100)*h;
  const dx=x2-x1, dy=y2-y1;
  const el=document.createElement('div');
  el.className='line';
  el.style.cssText=`left:${x1}px;top:${y1}px;width:${Math.sqrt(dx*dx+dy*dy)}px;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg)`;
  map.appendChild(el);
}
function renderMap() {
  map.querySelectorAll('.line,.node').forEach(el=>el.remove());
  const {width,height}=map.getBoundingClientRect();
  connections.forEach(([a,b]) => line(nodes.find(n=>n.id===a),nodes.find(n=>n.id===b),width,height));
  nodes.forEach(node => {
    const el=document.createElement('button');
    el.className='node'+(node.prefecture?' prefecture':'');
    el.style.left=(node.x/100)*width+'px';
    el.style.top=(node.y/100)*height+'px';
    el.innerHTML=`${node.hidden?'?':String(node.id).padStart(2,'0')}<span class="label">${node.label}</span>`;
    el.onclick=()=>{
      const text=node.id===20?'从此地出发':node.id===4?'到此为止':node.id===11?'去世于此':node.id===15?'来自此地':'未经过此地';
      result.textContent=text; result.classList.add('show');
    };
    map.appendChild(el);
  });
}
renderMap();
window.addEventListener('resize',renderMap);
</script>
</body>
</html>

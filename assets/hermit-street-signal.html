<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>城区公共监控 · 21</title>
<style>
* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; margin: 0; }
body {
  overflow: hidden;
  background: #11191c;
  color: #b9c7c2;
  font-family: "SF Mono", "PingFang SC", "Microsoft YaHei", monospace;
}
.terminal {
  height: 100%;
  display: grid;
  grid-template-rows: 42px minmax(0, 1fr) 34px;
  background: #11191c;
}
.topbar, .footbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 0 14px;
  background: #1b282b;
  border-color: #334649;
  color: #91aaa6;
  font-size: 11px;
  letter-spacing: 1px;
}
.topbar { border-bottom: 1px solid #334649; }
.footbar { border-top: 1px solid #334649; }
.dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  margin-right: 7px;
  border-radius: 50%;
  background: #b84b45;
  box-shadow: 0 0 8px rgba(184,75,69,0.62);
  animation: blink 1.2s step-end infinite;
}
.viewport {
  position: relative;
  min-height: 0;
  overflow: hidden;
  background: #1d2b2e;
  cursor: crosshair;
  user-select: none;
  touch-action: manipulation;
}
.street {
  position: absolute;
  inset: -6%;
  transform: scale(1);
  transform-origin: center;
  transition: transform 0.18s ease-out;
  overflow: hidden;
  background: #374440;
}
.scene-photo {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  -webkit-user-drag: none;
  -webkit-touch-callout: none;
  user-select: none;
  filter: saturate(0.7) contrast(0.93) brightness(0.86);
  transition: filter 2s;
}
.target {
  position: absolute;
  left: 45.7%;
  top: 46.2%;
  width: 4.8%;
  height: 22%;
  border-radius: 48%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s;
}
.target::before,
.target::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
.target::before {
  width: 125%;
  aspect-ratio: 1;
  background: radial-gradient(circle, rgba(239,211,122,0.45), rgba(222,190,91,0.15) 42%, transparent 72%);
  filter: blur(4px);
}
.target::after {
  width: 92%;
  aspect-ratio: 1;
  border: 1px solid rgba(237,210,128,0.8);
  box-shadow: 0 0 20px rgba(229,198,103,0.68);
}
.building {
  position: absolute;
  top: 4%;
  height: 39%;
  border: 1px solid rgba(20,32,32,0.52);
  background: #66716d;
}
.building.a { left: 0; width: 27%; }
.building.b { left: 27%; width: 30%; background: #707a73; }
.building.c { left: 57%; width: 22%; background: #626d69; }
.building.d { right: 0; width: 21%; background: #6e7874; }
.window {
  position: absolute;
  width: 10%;
  height: 11%;
  background: rgba(44,61,60,0.58);
  border: 1px solid rgba(28,44,44,0.44);
}
.sign {
  position: absolute;
  top: 26%;
  padding: 5px 10px;
  border: 1px solid rgba(39,55,54,0.55);
  background: rgba(203,199,175,0.56);
  color: rgba(45,54,48,0.82);
  font-family: "Songti SC", "SimSun", serif;
  font-size: clamp(12px, 1.8vw, 20px);
  letter-spacing: 4px;
}
.sign.s1 { left: 7%; }
.sign.s2 { left: 34%; }
.sign.s3 { left: 62%; }
.awning {
  position: absolute;
  top: 36%;
  left: 4%;
  width: 24%;
  height: 7%;
  background: repeating-linear-gradient(90deg, #9b715f 0 18px, #d1bca1 18px 36px);
  box-shadow: 0 6px 0 rgba(45,55,52,0.18);
}
.stall {
  position: absolute;
  left: 6%;
  top: 44%;
  width: 20%;
  height: 13%;
  border: 3px solid #4d5a54;
  background: #68716a;
}
.stall::before {
  content: "豆浆　包子　热粥";
  position: absolute;
  left: 5%;
  top: 20%;
  color: #d4d0bb;
  font-family: "Songti SC", "SimSun", serif;
  font-size: clamp(10px, 1.3vw, 16px);
}
.bus-stop {
  position: absolute;
  right: 9%;
  top: 33%;
  width: 7px;
  height: 28%;
  background: #314b4a;
}
.bus-stop::before {
  content: "公交";
  position: absolute;
  top: -34px;
  left: -16px;
  width: 40px;
  padding: 4px 0;
  border: 2px solid #385e5b;
  background: #d2d3c5;
  color: #375653;
  text-align: center;
  font-size: 12px;
}
.road-line {
  position: absolute;
  left: 0;
  bottom: 18%;
  width: 100%;
  height: 3px;
  background: repeating-linear-gradient(90deg, transparent 0 34px, rgba(214,208,172,0.48) 34px 78px);
}
.bench {
  position: absolute;
  left: 72%;
  top: 50%;
  width: 14%;
  height: 5px;
  background: #4b4b43;
  box-shadow: 0 7px 0 -1px #3f413d;
}
.bench::before, .bench::after {
  content: "";
  position: absolute;
  top: 4px;
  width: 3px;
  height: 20px;
  background: #3f413d;
}
.bench::before { left: 12%; }
.bench::after { right: 12%; }
.lamp {
  position: absolute;
  left: 76%;
  top: 36%;
  width: 5px;
  height: 18%;
  background: #424b46;
}
.lamp::before {
  content: "";
  position: absolute;
  top: -17px;
  left: -10px;
  width: 24px;
  height: 20px;
  border: 3px solid #47534d;
  background: rgba(198,181,112,0.12);
  transition: background 1.6s, box-shadow 1.6s;
}
.hermit {
  position: absolute;
  left: 79%;
  top: 47%;
  width: 20px;
  height: 48px;
  border-radius: 48% 48% 15% 15%;
  background: #4b544f;
  opacity: 0.82;
  transform-origin: bottom;
  animation: polish 3.8s ease-in-out infinite;
  transition: opacity 1.8s, filter 1.8s;
}
.hermit::before {
  content: "";
  position: absolute;
  left: 3px;
  top: -13px;
  width: 14px;
  height: 15px;
  border-radius: 50%;
  background: #5b625b;
}
.hermit::after {
  content: "";
  position: absolute;
  left: -13px;
  top: 12px;
  width: 18px;
  height: 3px;
  background: #555e58;
  transform-origin: right;
  animation: wipe 3.8s ease-in-out infinite;
}
.person {
  position: absolute;
  bottom: var(--bottom);
  left: -8%;
  width: var(--w, 18px);
  height: var(--h, 48px);
  border-radius: 45% 45% 18% 18%;
  background: var(--color, #5f6964);
  opacity: 0.86;
  animation: cross var(--speed) linear infinite;
  animation-delay: var(--delay);
  transition: opacity 2s;
}
.person::before {
  content: "";
  position: absolute;
  left: 18%;
  top: -25%;
  width: 64%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: inherit;
}
.person.reverse {
  left: auto;
  right: -8%;
  animation-name: crossReverse;
}
.noise {
  position: absolute;
  inset: 0;
  z-index: 8;
  pointer-events: none;
  opacity: var(--noise, 0.16);
  background:
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(236,246,234,0.14) 4px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 5px);
  mix-blend-mode: screen;
  transition: opacity 1.4s;
}
.noise::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0 17%, rgba(230,245,237,0.28) 18%, transparent 19% 68%, rgba(230,245,237,0.16) 69%, transparent 70%);
  animation: scramble 0.42s steps(2) infinite;
}
.noise::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.78) 0 1px, transparent 1.4px),
    radial-gradient(circle, rgba(10,18,18,0.88) 0 1px, transparent 1.6px),
    radial-gradient(circle, rgba(225,238,232,0.56) 0 1px, transparent 1.5px);
  background-position: 0 0, 7px 11px, 15px 4px;
  background-size: 11px 9px, 13px 12px, 17px 15px;
  mix-blend-mode: screen;
  transition: opacity 0.22s;
}
.noise.static::before {
  opacity: var(--static, 0.58);
  animation: tvStatic 0.12s steps(2) infinite;
}
.stamp {
  position: absolute;
  top: 12px;
  left: 14px;
  z-index: 10;
  color: rgba(227,239,232,0.76);
  font-size: 11px;
  line-height: 1.8;
  letter-spacing: 1px;
  text-shadow: 0 1px 2px #1c2928;
}
.toast {
  position: absolute;
  left: 50%;
  bottom: 18px;
  z-index: 15;
  max-width: min(560px, calc(100% - 30px));
  padding: 9px 13px;
  border: 1px solid rgba(148,178,171,0.3);
  background: rgba(21,35,36,0.84);
  color: #a9bfba;
  font-size: 11px;
  line-height: 1.6;
  letter-spacing: 1px;
  opacity: 0;
  transform: translate(-50%, 8px);
  transition: opacity 0.24s, transform 0.24s;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }
.reveal {
  position: absolute;
  left: 22px;
  bottom: 22px;
  z-index: 14;
  width: min(540px, calc(100% - 36px));
  padding: 22px 24px;
  border: 1px solid rgba(166,190,181,0.38);
  background: rgba(10,20,20,0.9);
  color: #d2d9cf;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 0.8s, transform 0.8s;
  box-shadow: 0 12px 36px rgba(0,0,0,0.28);
}
.reveal .small {
  color: #78958e;
  font-size: 11px;
  letter-spacing: 3px;
}
.reveal p {
  margin: 14px 0 0;
  color: #dad6c6;
  font-family: "Songti SC", "SimSun", serif;
  font-size: 21px;
  line-height: 2;
  letter-spacing: 3px;
  text-shadow: 2px 0 rgba(158,62,55,0.42), -2px 0 rgba(67,151,143,0.34);
}
.reveal .line {
  display: block;
  opacity: 0;
  transform: translateX(-8px);
}
.reveal .line.one { animation: voiceLine 1.1s 1.25s steps(3) forwards; }
.reveal .line.two { animation: voiceLine 1.25s 2.7s steps(4) forwards; }
.intrusion {
  position: absolute;
  inset: 0;
  z-index: 13;
  pointer-events: none;
  opacity: 0;
  background:
    linear-gradient(180deg, transparent 0 22%, rgba(218,232,221,0.2) 23%, transparent 24% 57%, rgba(153,50,45,0.16) 58%, transparent 59%),
    repeating-linear-gradient(0deg, transparent 0 7px, rgba(236,245,236,0.1) 8px);
}
.revealed .intrusion { animation: intrusionBurst 1.3s steps(3) forwards; }
.revealed .stamp { animation: stampFault 1.5s steps(2) forwards; }
.revealed .street { animation: frameFault 1.15s steps(3) forwards; }
.revealed .reveal { animation: revealFault 0.95s 0.7s steps(3) forwards; }
.revealed .target { animation: targetPulse 2.4s 0.8s ease-out forwards; }
.revealed .noise { animation: finalStatic 1.3s steps(3) forwards; }
.revealed .noise::before { opacity: 0.9; animation: tvStatic 0.08s steps(2) infinite; }
.revealed .noise::after { opacity: 0.6; }
.revealed .scene-photo { filter: saturate(0.4) contrast(0.98) brightness(0.58); }
.revealed .reveal { opacity: 1; transform: translateY(0); }
@keyframes intrusionBurst {
  0% { opacity: 0; transform: translateY(-3%); }
  18% { opacity: 0.96; transform: translateY(2%); }
  42% { opacity: 0.2; transform: translateY(-1%); }
  68% { opacity: 0.72; }
  100% { opacity: 0; transform: translateY(0); }
}
@keyframes stampFault {
  0%, 100% { opacity: 0.76; transform: translate(0); }
  32% { opacity: 0.18; transform: translate(8px, -2px); }
  58% { opacity: 0.92; transform: translate(-5px, 1px); }
}
@keyframes frameFault {
  0%, 100% { transform: scale(1); }
  28% { transform: translateX(-7px) scale(1.012); }
  52% { transform: translateX(5px) scale(1); }
}
@keyframes revealFault {
  0% { opacity: 0; transform: translate(-7px, 10px); }
  35% { opacity: 0.82; transform: translate(6px, 3px); }
  62% { opacity: 0.32; transform: translate(-2px, 0); }
  100% { opacity: 1; transform: translate(0, 0); }
}
@keyframes voiceLine {
  0% { opacity: 0; transform: translateX(-8px); filter: blur(3px); }
  45% { opacity: 0.45; transform: translateX(4px); filter: blur(1px); }
  100% { opacity: 1; transform: translateX(0); filter: blur(0); }
}
@keyframes targetPulse {
  0% { opacity: 0; }
  36% { opacity: 0.94; }
  68% { opacity: 0.28; }
  100% { opacity: 0.86; }
}
@keyframes finalStatic {
  0% { opacity: 0.92; }
  58% { opacity: 0.78; }
  100% { opacity: 0.035; }
}
@keyframes blink { 50% { opacity: 0.34; } }
@keyframes cross { to { transform: translateX(124vw); } }
@keyframes crossReverse { to { transform: translateX(-124vw); } }
@keyframes polish { 50% { transform: rotate(2deg); } }
@keyframes wipe { 50% { transform: rotate(-18deg); } }
@keyframes scramble {
  0% { transform: translateX(-3%); opacity: 0.18; }
  50% { transform: translateX(4%); opacity: 0.5; }
  100% { transform: translateX(0); opacity: 0.2; }
}
@keyframes tvStatic {
  0% { transform: translate(0, 0); background-position: 0 0, 7px 11px, 15px 4px; }
  25% { transform: translate(-3px, 2px); background-position: 8px 3px, 1px 8px, 12px 14px; }
  50% { transform: translate(2px, -2px); background-position: 3px 9px, 13px 2px, 4px 7px; }
  75% { transform: translate(-1px, 3px); background-position: 11px 5px, 5px 14px, 17px 1px; }
  100% { transform: translate(1px, -1px); background-position: 2px 12px, 10px 4px, 8px 11px; }
}

@media (max-width: 640px) {
  body { padding: 10px 8px; font-size: 13px; }
  img { max-width: 100%; height: auto; }
  .wrap, .page, .content, .main { width: 100%; }
}
</style>
<link rel="stylesheet" href="mobile-fix.css">
</head>
<body>
<main class="terminal">
  <header class="topbar">
    <div><span class="dot"></span>城区公共监控 / CAM-21</div>
    <div id="status">SIGNAL UNSTABLE</div>
  </header>
  <section class="viewport" id="viewport">
    <div class="street" id="street">
      <img class="scene-photo" src="ChatGPT Image 2026年5月30日 16_01_50.png" alt="旧城区街口监控画面" draggable="false">
      <div class="target" aria-label="稳定信号目标"></div>
    </div>
    <div class="noise" id="noise"></div>
    <div class="intrusion"></div>
    <div class="stamp">2026-02-16 12:16:21<br>OLD TOWN CROSSING · LIVE</div>
    <div class="toast" id="toast"></div>
    <div class="reveal">
      <div class="small">UNKNOWN SOURCE / AUDIO CHANNEL OVERRIDE</div>
      <p>
        <span class="line one">你身上，有祂的气息……</span>
        <span class="line two">你是从南京来的吗？</span>
      </p>
    </div>
  </section>
  <footer class="footbar">
    <span id="meter">NOISE 18%</span>
    <span id="event">PASSERBY TRAFFIC DETECTED</span>
  </footer>
</main>
<script>
(function() {
  var viewport = document.getElementById('viewport');
  var street = document.getElementById('street');
  var toast = document.getElementById('toast');
  var noiseLayer = document.getElementById('noise');
  var meter = document.getElementById('meter');
  var eventText = document.getElementById('event');
  var status = document.getElementById('status');
  var idleStarted = Date.now();
  var noise = 18;
  var disturbanceBoost = 0;
  var revealed = false;
  var toastTimer;
  var hotspots = [
    { x1: 0.00, y1: 0.28, x2: 0.31, y2: 0.80, text: '无关片段：早点摊蒸汽遮挡画面' },
    { x1: 0.22, y1: 0.20, x2: 0.39, y2: 0.43, text: '无关片段：土菜馆招牌识别置信度 42%' },
    { x1: 0.65, y1: 0.24, x2: 0.82, y2: 0.68, text: '目标偏移：公交站候车人流持续变化' },
    { x1: 0.88, y1: 0.48, x2: 1.00, y2: 0.86, text: '目标偏移：外卖骑手短暂停留' },
    { x1: 0.35, y1: 0.39, x2: 0.66, y2: 0.62, text: '目标偏移：路口车辆遮挡' },
    { x1: 0.28, y1: 0.48, x2: 0.86, y2: 0.94, text: '自动聚焦失败：街口行人遮挡' },
    { x1: 0.44, y1: 0.42, x2: 0.53, y2: 0.72, text: '识别异常：电线杆右侧戴头盔男子长时间停留，面部识别失败' }
  ];

  function updateNoiseLayer() {
    noiseLayer.style.setProperty('--noise', Math.max(0.04, 0.12 + noise / 155).toFixed(2));
    noiseLayer.style.setProperty('--static', Math.min(0.88, Math.max(0.28, noise / 100)).toFixed(2));
    noiseLayer.classList.toggle('static', noise >= 34);
  }
  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 1800);
  }
  function disturb(text) {
    if (revealed) return;
    idleStarted = Date.now();
    disturbanceBoost = Math.min(74, disturbanceBoost + 13);
    noise = Math.min(92, 18 + disturbanceBoost);
    meter.textContent = 'NOISE ' + Math.round(noise) + '%';
    eventText.textContent = 'MANUAL TRACE / SIGNAL INTERRUPTED';
    updateNoiseLayer();
    showToast(text || '画面噪声升高：该区域未检出有效信息');
  }
  function responseForPoint(clientX, clientY) {
    var rect = street.getBoundingClientRect();
    var x = (clientX - rect.left) / rect.width;
    var y = (clientY - rect.top) / rect.height;
    for (var i = hotspots.length - 1; i >= 0; i--) {
      var h = hotspots[i];
      if (x >= h.x1 && x <= h.x2 && y >= h.y1 && y <= h.y2) return h.text;
    }
    return '画面噪声升高：该区域未检出有效信息';
  }
  function reveal() {
    if (revealed) return;
    revealed = true;
    document.body.classList.add('revealed');
    noiseLayer.classList.add('static');
    meter.textContent = 'NOISE 02%';
    eventText.textContent = 'AUDIO CHANNEL OVERRIDE';
    status.textContent = 'UNKNOWN SOURCE';
  }

  viewport.addEventListener('click', function(e) {
    disturb(responseForPoint(e.clientX, e.clientY));
  });
  viewport.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    disturb('右键检索无效：监控缓存仅支持画面识别');
  });
  viewport.addEventListener('dragstart', function(e) {
    e.preventDefault();
  });
  setInterval(function() {
    if (revealed) return;
    var elapsed = Date.now() - idleStarted;
    var boostFade = Math.max(0, 1 - elapsed / 9000);
    noise = Math.max(2, 18 - elapsed / 1900 + disturbanceBoost * boostFade);
    meter.textContent = 'NOISE ' + Math.round(noise) + '%';
    updateNoiseLayer();
    if (elapsed > 12000) eventText.textContent = 'BACKGROUND TRAFFIC FADING';
    if (elapsed >= 30000) reveal();
  }, 500);
})();
</script>
</body>
</html>

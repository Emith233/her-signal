<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缓存提示</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #eef2f3; color: #1c2428; }
body {
  display: grid;
  place-items: center;
  padding: 28px;
  font-family: Arial, "Microsoft YaHei", sans-serif;
}
.note {
  width: min(680px, 100%);
  background: #fff;
  border: 1px solid #d4dde1;
  box-shadow: 0 18px 44px rgba(37, 52, 59, .12);
}
.head {
  padding: 14px 18px;
  border-bottom: 1px solid #dce4e7;
  color: #64747b;
  font-size: 12px;
  letter-spacing: .08em;
}
.body {
  padding: 34px 38px 38px;
  font-size: 18px;
  line-height: 2.05;
}
p { margin: 0 0 16px; }
p:last-child { margin-bottom: 0; }
.sig {
  margin-top: 26px;
  color: #8a969b;
  font-size: 13px;
  letter-spacing: .12em;
}

@media (max-width: 640px) {
  body { padding: 10px 8px; font-size: 13px; }
  img { max-width: 100%; height: auto; }
  .wrap, .page, .content, .main { width: 100%; }
}
</style>
<link rel="stylesheet" href="mobile-fix.css">
<script src="mobile-fix.js" defer></script>
</head>
<body>
<main class="note">
  <div class="head">CACHE NOTE / PK</div>
  <section class="body">
    <p>又是我</p>
    <p>给你这个提示是为了防止你卡关</p>
    <p>我想如果你卡关了就会找到这里！</p>
    <p>总之请想办法解压文件</p>
    <p>请不要使用系统解压软件 换个解压软件试试吧。</p>
    <div class="sig">RECOVERED MESSAGE</div>
  </section>
</main>
</body>
</html>

<body link="#0033CC">

<div align="center">
<table border="1" width="100%" height="100%" cellspacing="0" cellpadding="0" bordercolor="#008000">
  <tr>
    <td width="100%" height="100%">
      <table border="0" width="100%" height="100%" cellspacing="0" cellpadding="0">
        <tr>
          <td width="100%" bgcolor="#B1F1BE" height="52" colspan="3">
            <b><font size="6" color="#FF0000">&nbsp;✦ 彩虹使徒 · 我們所信的 ✦</font></b>
          </td>
        </tr>
        <tr>
          <td width="100%" bgcolor="#FFFFEC" height="100%" colspan="3" valign="top">
            <p align="left" style="margin-left: 28px; margin-right: 24px; margin-top:20px;">
            <b><font color="#FF0000" size="6">伊里斯</font></b></p>
            <p align="center"><img border="2" src="rainbow-iris-final.jpg" width="320" alt="虹"></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            虹不在極端處出現。它在天與地之間，不多不少，剛好在中間。你看見的時候——就是該站住的時候。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace"><b>信條</b></font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            壹　我信虹是橋。沒有橋，兩端永遠分離。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            貳　我信知道卻不行的人，還不知道。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            参　我信心裡的鏡子要常常擦。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            肆　我信你知道的，都在你心裡。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            伍　我信知而不行，只是未知。
            </font></p>
            <p style="line-height: 200%; margin-left: 28px; margin-right: 24px">
            <font size="5" face="细明体,PMingLiU,MingLiU,monospace">
            不急著伸手，不急着追。橋自然會在該在的地方。
            </font></p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微聊 · Web</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif; font-size:14px; background:#eef1f2; user-select:none; }

/* ===== 整体布局 ===== */
.wx-container {
  width:min(1180px, calc(100% - 36px)); height:calc(100% - 36px); display:flex;
  margin:18px auto; background:#fff; border:1px solid #d9dede;
  box-shadow:0 12px 36px rgba(42,55,55,0.12);
}

/* ===== 左侧面板 ===== */
.wx-side {
  width:288px; min-width:288px; background:#f6f8f8; color:#4b5758;
  display:flex; flex-direction:column; border-right:1px solid #dfe4e4;
}

/* 顶栏 */
.wx-side .header {
  background:#fff; padding:14px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #e5e9e9;
}
.wx-side .header .logo {
  width:24px; height:24px; background:#07c160; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:bold; font-size:14px;
}
.wx-side .header .title { font-size:16px; color:#354142; flex:1; font-weight:500; }
.wx-side .header .icons { display:flex; gap:4px; }
.wx-side .header .icons button {
  width:30px; height:30px; border:none; background:transparent; border-radius:4px;
  color:#8b9999; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.wx-side .header .icons button:hover { background:#f0f5f4; color:#3c6a62; }
.account-strip {
  padding:7px 12px;
  border-bottom:1px solid #e5e9e9;
  background:#fbfcfc;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.account-strip .account-pill {
  flex:1;
  min-width:0;
  color:#60706f;
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.account-strip .account-avatar {
  width:24px;
  height:24px;
  border-radius:4px;
  background-size:cover;
  background-position:center;
  flex-shrink:0;
}
.account-strip .switch-account {
  border:1px solid #d9e3e1;
  background:#fff;
  color:#49645f;
  border-radius:4px;
  padding:4px 9px;
  cursor:pointer;
  font-size:12px;
}
.account-strip .switch-account:hover { border-color:#a8c5bf; background:#f2f8f6; color:#235d52; }

/* 搜索 */
.wx-side .search { padding:8px 12px; flex-shrink:0; }
.wx-side .search input {
  width:100%; background:#edf1f1; border:1px solid #e1e7e6; border-radius:4px;
  padding:7px 10px; color:#526061; font-size:12px; outline:none;
}
.wx-side .search input::placeholder { color:#9daaaa; }

/* 聊天列表 */
.wx-side .chat-list { flex:1; overflow-y:auto; }
.wx-side .chat-list::-webkit-scrollbar { width:4px; }
.wx-side .chat-list::-webkit-scrollbar-thumb { background:#cbd5d4; border-radius:2px; }

.wx-chat-item {
  display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; border-bottom:1px solid #edf0f0;
  transition:background 0.1s;
}
.wx-chat-item:hover { background:#eef4f3; }
.wx-chat-item.active { background:#dceee9; }
.wx-chat-item .avatar {
  width:42px; height:42px; border-radius:4px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:16px; font-weight:500;
}
.wx-chat-item .info { flex:1; min-width:0; }
.wx-chat-item .info .top { display:flex; align-items:center; gap:6px; }
.wx-chat-item .info .name { font-size:14px; color:#405051; }
.wx-chat-item .info .time { font-size:11px; color:#b0baba; margin-left:auto; white-space:nowrap; }
.wx-chat-item .info .preview { font-size:12px; color:#8f9c9c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* ===== 主聊天区 ===== */
.wx-main {
  flex:1; display:flex; flex-direction:column; min-width:0; background:#f4f7f6;
}

/* 聊天顶栏 */
.wx-main .chat-header {
  background:#fff; padding:14px 20px; border-bottom:1px solid #e1e6e5; flex-shrink:0;
  display:flex; align-items:center; gap:8px;
}
.wx-main .chat-header .name { font-size:15px; color:#333; font-weight:500; }
.wx-main .chat-header .hint { font-size:11px; color:#999; }
.wx-main .chat-header .spacer { flex:1; }

/* 聊天消息区 */
.wx-main .chat-body {
  flex:1; overflow-y:auto; padding:20px 30px; display:flex; flex-direction:column; gap:18px;
  background:#f4f7f6;
}
.wx-empty-chat {
  margin:auto;
  color:#a9b4b3;
  font-size:13px;
  letter-spacing:1px;
  text-align:center;
  line-height:1.9;
}
.wx-main .chat-body::-webkit-scrollbar { width:5px; }
.wx-main .chat-body::-webkit-scrollbar-thumb { background:#c0c0c0; border-radius:3px; }

.wx-msg {
  max-width:min(68%, 560px); display:flex; gap:8px; align-items:flex-start;
}
.wx-msg.in { align-self:flex-start; }
.wx-msg.out { align-self:flex-end; max-width:min(70%, 600px); }

.wx-msg .avatar {
  width:36px; height:36px; border-radius:4px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px;
}
.wx-msg .bubble {
  max-width:34em;
  padding:9px 14px; font-size:14px; line-height:1.7; word-break:break-word; overflow-wrap:anywhere;
  position:relative; box-shadow:0 1px 2px rgba(0,0,0,0.04);
  text-align:left;
}
.wx-msg.in .bubble {
  background:#fff; color:#333; border-radius:0 6px 6px 6px;
}
.wx-msg.out .avatar {
  background-size: cover;
  background-position: center;
}
.wx-msg.out .bubble {
  background:#95ec69; color:#333; border-radius:6px 0 6px 6px;
}
.wx-time-sep {
  text-align:center; font-size:12px; color:#b0b0b0; padding:8px 0 4px; line-height:1;
}

/* 输入区 */
.wx-main .chat-input {
  background:#fff; border-top:1px solid #e1e6e5; padding:10px 20px; flex-shrink:0;
  display:flex; align-items:flex-end; gap:10px;
}
.wx-main .chat-input .toolbar {
  display:flex; gap:4px; align-items:center;
}
.wx-main .chat-input .toolbar button {
  width:30px; height:30px; border:none; background:transparent; border-radius:4px;
  font-size:18px; cursor:pointer; color:#666; display:flex; align-items:center; justify-content:center;
}
.wx-main .chat-input .toolbar button:hover { background:#e0e0e0; }
.wx-main .chat-input textarea {
  flex:1; min-width:0; border:none; background:#fff; border-radius:4px;
  padding:9px 12px; font-size:14px; color:#333; outline:none; resize:none;
  font-family:inherit; line-height:1.5; min-height:36px; max-height:80px;
}
.wx-main .chat-input textarea::placeholder { color:#aaa; }
.wx-main .chat-input .send-btn {
  background:#07c160; border:none; color:#fff; padding:8px 22px; border-radius:4px;
  cursor:pointer; font-size:13px; white-space:nowrap;
}
.wx-main .chat-input .send-btn:hover { background:#06ad56; }
.wx-main .chat-input .send-btn:disabled { background:#b0b0b0; cursor:default; }

/* ===== 通讯录 ===== */
.wx-contacts { display:none; flex:1; flex-direction:column; background:#f0f0f0; }
.wx-contacts.show { display:flex; }

.wx-contacts .search-bar {
  background:#f0f0f0; padding:8px 16px; border-bottom:1px solid #ddd; flex-shrink:0;
}
.wx-contacts .search-bar input {
  width:100%; background:#fff; border:none; border-radius:4px;
  padding:7px 12px; font-size:13px; color:#333; outline:none;
}
.wx-contacts .search-bar input::placeholder { color:#aaa; }

.wx-contacts .list-wrap {
  flex:1; overflow-y:auto; background:#fff;
}
.wx-contact-empty {
  padding:72px 20px;
  color:#a8b2b1;
  font-size:13px;
  letter-spacing:1px;
  text-align:center;
}

.wx-contact-item {
  display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer;
  border-bottom:1px solid #f0f0f0; transition:background 0.1s;
}
.wx-contact-item:hover { background:#f8f8f8; }
.wx-contact-item .avatar {
  width:40px; height:40px; border-radius:4px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px;
}
.wx-contact-item .info { flex:1; min-width:0; }
.wx-contact-item .info .name { font-size:14px; color:#333; }
.wx-contact-item .info .desc { font-size:12px; color:#999; margin-top:2px; }
.wx-contact-item .add-btn {
  background:#07c160; border:none; color:#fff; padding:4px 14px; border-radius:3px;
  cursor:pointer; font-size:12px; white-space:nowrap;
}
.wx-contact-item .add-btn:hover { background:#06ad56; }
.wx-contact-item .add-btn.done { background:#e0e0e0; color:#999; cursor:default; }

/* ===== 通讯录顶栏 ===== */
.wx-contact-header {
  background:#f0f0f0; padding:14px 20px; border-bottom:1px solid #ddd; flex-shrink:0;
  display:flex; align-items:center; gap:8px;
}
.wx-contact-header .title { font-size:15px; color:#333; font-weight:500; flex:1; }
.wx-contact-header .back-btn {
  border:none; background:none; font-size:14px; color:#07c160; cursor:pointer; padding:4px 8px;
}

/* ===== 联系人详情 ===== */
.wx-detail {
  display:none; flex-direction:column; background:#f5f5f5;
  width:320px; min-width:320px;
}
.wx-detail.show { display:flex; }

.wx-detail .profile {
  text-align:center; padding:40px 20px 24px; background:#fff; border-bottom:1px solid #eee;
}
.wx-detail .profile .avatar {
  width:64px; height:64px; border-radius:4px; margin:0 auto 12px;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:24px;
}
.wx-detail .profile .name { font-size:18px; color:#333; font-weight:500; }
.wx-detail .profile .status { font-size:13px; color:#999; margin-top:4px; }

.wx-detail .actions {
  background:#fff; margin-top:10px; border-top:1px solid #eee; border-bottom:1px solid #eee;
}
.wx-detail .actions .act {
  padding:14px 20px; font-size:15px; color:#333; cursor:pointer; border-bottom:1px solid #f0f0f0;
  display:flex; align-items:center; gap:10px;
}
.wx-detail .actions .act:hover { background:#f8f8f8; }
.wx-detail .actions .act .icon { font-size:18px; width:24px; text-align:center; }

/* ===== 弹窗 ===== */
.wx-modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.45); align-items:center; justify-content:center;
}
.wx-modal-overlay.show { display:flex; }

.wx-modal {
  background:#fff; border-radius:8px; width:380px; max-width:90%; padding:28px 30px 20px;
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
}
.wx-modal h3 { font-size:16px; color:#333; margin-bottom:16px; font-weight:500; }
.wx-modal input {
  width:100%; background:#f8f8f8; border:1px solid #ddd; border-radius:4px;
  padding:9px 12px; font-size:14px; color:#333; outline:none;
}
.wx-modal input:focus { border-color:#07c160; }
.wx-modal .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.wx-modal .modal-btns button {
  padding:7px 20px; border-radius:4px; cursor:pointer; font-size:13px; border:none;
}
.wx-modal .modal-btns .cancel { background:#f0f0f0; color:#666; }
.wx-modal .modal-btns .cancel:hover { background:#e0e0e0; }
.wx-modal .modal-btns .confirm { background:#07c160; color:#fff; }
.wx-modal .modal-btns .confirm:hover { background:#06ad56; }
.account-list { display:grid; gap:8px; margin-top:6px; }
.account-card {
  width:100%;
  border:1px solid #e4e9e8;
  background:#fbfcfc;
  border-radius:6px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:14px;
  text-align:left;
  cursor:pointer;
  color:#3f4f4f;
}
.account-card:hover { border-color:#b9d2cc; background:#f4faf8; }
.account-card.active { border-color:#07c160; background:#edf8f3; }
.account-card.locked { color:#9da8a7; }
.account-card .mark {
  width:42px;
  height:42px;
  border-radius:4px;
  background:#dce5e3;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  color:#fff;
  font-size:0;
}
.account-card .mark.placeholder {
  background-image:none !important;
  background:#edf3f1;
  border:1px dashed #b7c8c4;
  color:#8aa09b;
  font-size:22px;
}
.account-card.locked .mark { filter:grayscale(.35); opacity:.62; }
.account-card .meta {
  flex:1;
  min-width:0;
  display:grid;
  gap:5px;
}
.account-card .name {
  display:block;
  font-size:15px;
  line-height:1.25;
  color:#344342;
}
.account-card .desc {
  display:block;
  font-size:12px;
  line-height:1.25;
  color:#94a09f;
}
.account-error { min-height:18px; margin-top:8px; color:#d2685e; font-size:12px; }

/* ===== 响应式 ===== */
@media (max-width:720px) {
  .wx-side { width:200px; min-width:200px; }
  .wx-msg { max-width:75%; }
  .wx-main .chat-body { padding:14px 16px; }
}
@media (max-width:480px) {
  .wx-side { width:60px; min-width:60px; }
  .wx-side .header .title { display:none; }
  .wx-side .search { display:none; }
  .wx-chat-item .info { display:none; }
  .wx-msg { max-width:85%; }
  .wx-main .chat-input { padding:8px 10px; }
  .wx-main .chat-input .send-btn { padding:8px 14px; }
}
</style>
</head>
<body>

<div class="wx-container">

  <!-- 左侧面板 -->
  <div class="wx-side">
    <div class="header">
      <div class="logo">微</div>
      <span class="title">微聊</span>
      <div class="icons">
        <button onclick="switchPanel('chat')" title="聊天">◇</button>
        <button onclick="switchPanel('contacts')" title="通讯录">♧</button>
        <button onclick="openAccountModal()" title="切换账号">⇄</button>
        <button onclick="toggleMenu()" title="更多">⋯</button>
      </div>
    </div>
    <div class="account-strip">
      <span class="account-avatar" id="currentAccountAvatar"></span>
      <span class="account-pill" id="currentAccountLabel">当前：初始账号</span>
      <button class="switch-account" type="button" onclick="openAccountModal()">切换</button>
    </div>
    <div class="search">
      <input type="text" id="wxSearch" placeholder="搜索" oninput="filterChats(this.value)">
    </div>
    <div class="chat-list" id="wxChatList">
      <div class="wx-chat-item" data-id="kefu" onclick="selectChat('kefu')">
        <div class="avatar" style="background:#7a8c96;"></div>
        <div class="info">
          <div class="top"><span class="name">信息服务客服中心</span><span class="time"></span></div>
          <div class="preview">您好，请提供您的用户编号</div>
        </div>
      </div>
      <div class="wx-chat-item" data-id="file" onclick="selectChat('file')">
        <div class="avatar" style="background:#4d8c72;"></div>
        <div class="info">
          <div class="top"><span class="name">文件传输助手</span><span class="time"></span></div>
          <div class="preview">暂无消息</div>
        </div>
      </div>
      <div class="wx-chat-item" data-id="system" onclick="selectChat('system')">
        <div class="avatar" style="background:#6f7f91;"></div>
        <div class="info">
          <div class="top"><span class="name">系统通知</span><span class="time"></span></div>
          <div class="preview">欢迎使用微聊</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 主聊天区 -->
  <div class="wx-main" id="wxMain">
    <div class="chat-header">
      <span class="name" id="wxChatName" style="cursor:pointer;" onclick="showCurrentDetail()">未选择聊天</span>
      <span class="hint" id="wxChatStatus"></span>
      <span class="spacer"></span>
      <span style="font-size:11px;color:#bbb;">微聊 Web</span>
    </div>
    <div class="chat-body" id="wxChatBody">
      <div class="wx-empty-chat">请选择左侧会话</div>
    </div>
    <div class="chat-input">
      <div class="toolbar">
        <button title="表情">☺</button>
        <button title="附件">＋</button>
      </div>
      <textarea id="wxMsgInput" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendWxMsg();}"></textarea>
      <button class="send-btn" id="wxSendBtn" onclick="sendWxMsg()">发送</button>
    </div>
  </div>

  <!-- 通讯录 -->
  <div class="wx-contacts" id="wxContacts">
    <div class="wx-contact-header">
      <button class="back-btn" onclick="switchPanel('chat')">‹ 返回</button>
      <span class="title">搜索账号</span>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="搜索" oninput="filterContacts(this.value)" style="padding:10px 14px;font-size:14px;">
    </div>
    <div class="list-wrap" id="wxContactList">
      <div class="wx-contact-empty">暂无联系人</div>
    </div>
  </div>

  <!-- 联系人详情 -->
  <div class="wx-detail" id="wxDetail">
    <div class="wx-contact-header">
      <button class="back-btn" onclick="closeDetail()">‹ 通讯录</button>
      <span class="title">详细资料</span>
    </div>
    <div class="profile">
      <div class="avatar" id="detailAvatar" style="background:#07c160;">服</div>
      <div class="name" id="detailName">信息服务客服中心</div>
      <div class="status" id="detailStatus">在线</div>
    </div>
    <div class="actions">
      <div class="act" onclick="switchToChat()"><span class="icon">◇</span> 发消息</div>
      <div class="act" onclick="showMoments()"><span class="icon">☷</span> 朋友圈</div>
      <div class="act" onclick="showVoiceCall()"><span class="icon">⌕</span> 语音通话</div>
      <div class="act" onclick="showVoiceCall()"><span class="icon">▣</span> 视频通话</div>
    </div>
  </div>
</div>

<!-- 朋友圈弹窗 -->
<div class="wx-modal-overlay" id="momentsModal" style="background:rgba(0,0,0,0.55);">
  <div style="width:480px;max-width:92%;height:84vh;background:#f7f7f7;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;position:relative;">
    <button onclick="document.getElementById('momentsModal').classList.remove('show')" style="position:absolute;top:16px;right:16px;background:rgba(0,0,0,0.3);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10;">✕</button>
    <div style="flex:1;overflow-y:auto;" id="momentsContent"></div>
  </div>
</div>

<!-- 菜单弹窗 -->
<div class="wx-modal-overlay" id="menuModal">
  <div class="wx-modal" style="width:300px;text-align:center;">
    <h3>微聊 Web</h3>
    <p style="font-size:13px;color:#999;margin-bottom:16px;line-height:1.8;">
      微聊 Web 版 · 版本 2.0.1<br>本服务由信息服务中心提供
    </p>
    <div class="modal-btns" style="justify-content:center;">
      <button class="cancel" onclick="closeMenu()">取消</button>
    </div>
  </div>
</div>

<!-- 切换账号弹窗 -->
<div class="wx-modal-overlay" id="accountModal">
  <div class="wx-modal" style="width:420px;">
    <h3>切换账号</h3>
    <div class="account-list" id="accountList"></div>
    <div id="accountLoginBox" style="display:none;margin-top:14px;border-top:1px solid #edf0f0;padding-top:14px;">
      <input type="text" id="accountInput" placeholder="账号" autocomplete="off" style="margin-bottom:8px;">
      <input type="password" id="passwordInput" placeholder="密码" autocomplete="off" onkeydown="if(event.key==='Enter')confirmAccountLogin()">
      <div class="account-error" id="accountError"></div>
      <div class="modal-btns">
        <button class="cancel" onclick="hideAccountLogin()">取消</button>
        <button class="confirm" onclick="confirmAccountLogin()">登录</button>
      </div>
    </div>
    <div class="modal-btns" id="accountModalBtns">
      <button class="cancel" onclick="closeAccountModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 添加好友弹窗 -->
<div class="wx-modal-overlay" id="addFriendModal">
  <div class="wx-modal">
    <h3 id="addFriendTitle">添加好友</h3>
    <input type="text" id="addFriendInput" placeholder="输入验证消息..." onkeydown="if(event.key==='Enter')confirmAddFriend()">
    <div class="modal-btns">
      <button class="cancel" onclick="closeAddFriend()">取消</button>
      <button class="confirm" onclick="confirmAddFriend()">发送</button>
    </div>
  </div>
</div>

<script>
const ACCOUNT_STATE_KEY = 'wechat_account_state_v1';

  id: 'secondary',

const STORY_START_TS = new Date('2026-07-06T00:00:00+08:00').getTime();
const STORY_REAL_START_KEY = 'citymystery_story_real_start';

function getStoryNow() {
  let realStart = Number(localStorage.getItem(STORY_REAL_START_KEY) || '0');
  if (!realStart) {
    realStart = Date.now();
    try { localStorage.setItem(STORY_REAL_START_KEY, String(realStart)); } catch(e) {}
  }
  return new Date(STORY_START_TS + Math.max(0, Date.now() - realStart));
}

function currentTime() {
  const now = getStoryNow();
  return String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
function formatSidebarTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = getStoryNow();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const md = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (md.getTime() === today.getTime()) {
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  } else if (md.getTime() === yesterday.getTime()) {
    return '昨天';
  } else if (now.getTime() - md.getTime() < 7 * 86400000) {
    return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  } else {
    return (d.getMonth()+1)+'/'+d.getDate();
  }
}
function refreshSidebarTime(id) {
  const el = document.querySelector(`.wx-chat-item[data-id="${id}"] .time`);
  if (!el || !chatData[id]) return;
  const msgs = chatData[id].messages;
  const last = [...msgs].reverse().find(m => m.ts);
  el.textContent = last ? formatSidebarTime(last.ts) : '';
}

function imgUrl(url) {
  if (!url || url.startsWith('#') || url.startsWith('data:') || /^https?:\/\//i.test(url)) return url;
  return url + (url.includes('?') ? '&' : '?') + 'v=' + IMAGE_CACHE_VERSION;
}

function bgImage(url) {
  return 'background-image:url(' + imgUrl(url) + ');background-size:cover;background-position:center';
}

function accountStorageKey(base) {
  return base + '_' + accountState.current;
}

loadAccountState();

function loadAccountState() {
  const saved = localStorage.getItem(ACCOUNT_STATE_KEY);
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    accountState.current = data.current === 'secondary' ? 'secondary' : 'initial';
    accountState.secondaryUnlocked = !!data.secondaryUnlocked;
    accountState.secondaryLabel = data.secondaryLabel || SECONDARY_ACCOUNT.label;
    if (accountState.current === 'secondary' && !accountState.secondaryUnlocked) accountState.current = 'initial';
  } catch(e) {}
}

function saveAccountState() {
  localStorage.setItem(ACCOUNT_STATE_KEY, JSON.stringify(accountState));
}

function accountLabel() {
  return accountState.current === 'secondary' ? accountState.secondaryLabel : '初始账号';
}

function openAccountModal() {
  renderAccountList();
  hideAccountLogin();
  document.getElementById('accountModal').classList.add('show');
}

function closeAccountModal() {
  document.getElementById('accountModal').classList.remove('show');
}

function showAccountLogin() {
  document.getElementById('accountLoginBox').style.display = '';
  document.getElementById('accountModalBtns').style.display = 'none';
  document.getElementById('accountInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('accountError').textContent = '';
  setTimeout(() => document.getElementById('accountInput').focus(), 30);
}

function hideAccountLogin() {
  const box = document.getElementById('accountLoginBox');
  if (box) box.style.display = 'none';
  const btns = document.getElementById('accountModalBtns');
  if (btns) btns.style.display = '';
}

function confirmAccountLogin() {
  const acc = document.getElementById('accountInput').value.trim();
  const pwd = document.getElementById('passwordInput').value;
  const error = document.getElementById('accountError');
  if (acc === SECONDARY_ACCOUNT.account && pwd === SECONDARY_ACCOUNT.password) {
    accountState.secondaryUnlocked = true;
    accountState.secondaryLabel = acc;
    switchAccountTo('secondary', true);
    hideAccountLogin();
    closeAccountModal();
    return;
  }
  error.textContent = '账号或密码不正确';
}

function switchAccountTo(id, silent) {
  if (id === 'secondary' && !accountState.secondaryUnlocked) {
    showAccountLogin();
    return;
  }
  accountState.current = id === 'secondary' ? 'secondary' : 'initial';
  saveAccountState();
  updateAccountUI();
  if (!silent) closeAccountModal();
  setTimeout(() => location.reload(), 0);
}

function formatTimeSeparator(ts) {
  const d = new Date(ts);
  const now = getStoryNow();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const md = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const hhmm = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  if (md.getTime() === today.getTime()) return hhmm;
  if (md.getTime() === yesterday.getTime()) return '昨天 ' + hhmm;
  if (d.getFullYear() === now.getFullYear()) return (d.getMonth()+1)+'月'+d.getDate()+'日 '+hhmm;
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+hhmm;
}

// Sidebar entries added dynamically (beyond default kefu/file/system)
let sidebarExtraChats = [];

function saveSidebar() {
  // Save full order of all chat items in the sidebar
  const items = document.querySelectorAll('#wxChatList .wx-chat-item');
  const order = Array.from(items).map(el => el.dataset.id);
  localStorage.setItem(accountStorageKey('wechat_sidebar'), JSON.stringify(order));
}

function restoreSidebar() {
  const saved = localStorage.getItem(accountStorageKey('wechat_sidebar'));
  if (!saved) return;
  try {
    const order = JSON.parse(saved);
    const list = document.getElementById('wxChatList');
    order.forEach(id => {
      const item = document.querySelector(`.wx-chat-item[data-id="${id}"]`);
      if (item) list.appendChild(item); // move to end in saved order
    });
    // Track extra chats (non-default)
    sidebarExtraChats = order.filter(id => !['kefu','file','system'].includes(id));
  } catch(e) {}
}

// Save/load chat messages
function saveChatData() {
  const data = {};
  for (const id in chatData) {
    const msgs = chatData[id].messages;
    // Preview: use last non-warn message
    const lastMsg = [...msgs].reverse().find(m => m.type !== 'warn' && m.type !== 'notice');
    data[id] = {
      messages: msgs,
      preview: lastMsg ? lastMsg.text.substring(0, 18) + (lastMsg.text.length > 18 ? '...' : '') : ''
    };
  }
  data._contacts = contactsData.map(c => ({ id: c.id, friendStatus: c.friendStatus }));
  localStorage.setItem(accountStorageKey('wechat_messages'), JSON.stringify(data));
  saveSidebar();
}

function addSidebarChat(id) {
  if (document.querySelector(`.wx-chat-item[data-id="${id}"]`)) return;
  if (!chatData[id]) return;
  if (!sidebarExtraChats.includes(id)) sidebarExtraChats.push(id);
  const list = document.getElementById('wxChatList');
  const item = document.createElement('div');
  item.className = 'wx-chat-item';
  item.dataset.id = id;
  item.onclick = function(){ selectChat(id); };
  const av = chatData[id].avatar;
  const avStyle = av.startsWith('#') ? 'background:'+av : bgImage(av);
  item.innerHTML = `
    <div class="avatar" style="${avStyle};">${av.startsWith('#') ? chatData[id].letter : ''}</div>
    <div class="info">
      <div class="top"><span class="name">${chatData[id].name}</span><span class="time"></span></div>
      <div class="preview">${(()=>{const lm=[...chatData[id].messages].reverse().find(m=>m.type!=='warn'&&m.type!=='notice');return lm?lm.text.substring(0,18)+(lm.text.length>18?'...':''):'暂无消息';})()}</div>
    </div>
  `;
  list.appendChild(item);
  refreshSidebarTime(id);
  saveSidebar();
  saveChatData();
}

function loadChatData() {
  const saved = localStorage.getItem(accountStorageKey('wechat_messages'));
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    for (const id in data) {
      if (id === '_contacts') {
        data._contacts.forEach(sc => {
          const c = contactsData.find(c => c.id === sc.id);
          if (c) c.friendStatus = sc.friendStatus;
        });
        continue;
      }
      if (chatData[id]) {
        chatData[id].messages = data[id].messages;
        const preview = document.querySelector(`.wx-chat-item[data-id="${id}"] .preview`);
        if (preview && data[id].preview) preview.textContent = data[id].preview;
      }
    }
    // Restore sidebar entries
    const savedOrder = JSON.parse(localStorage.getItem(accountStorageKey('wechat_sidebar')) || '[]');
    sidebarExtraChats = savedOrder.filter(id => !['kefu','file','system'].includes(id));
    const clist = document.getElementById('wxChatList');
    // Create DOM for extra chats that don't exist yet
    savedOrder.forEach(id => {
      if (!chatData[id] || document.querySelector(`.wx-chat-item[data-id="${id}"]`)) return;
      const item = document.createElement('div');
      item.className = 'wx-chat-item';
      item.dataset.id = id;
      item.onclick = function(){ selectChat(id); };
      const msgs = chatData[id].messages;
      const lastMsg = [...msgs].reverse().find(m => m.type !== 'warn' && m.type !== 'notice');
      const preview = lastMsg ? lastMsg.text.substring(0,18)+(lastMsg.text.length>18?'...':'') : '暂无消息';
      const av2 = chatData[id].avatar;
      const avStyle2 = av2.startsWith('#') ? 'background:'+av2 : bgImage(av2);
      item.innerHTML = `
        <div class="avatar" style="${avStyle2};">${av2.startsWith('#') ? chatData[id].letter : ''}</div>
        <div class="info">
          <div class="top"><span class="name">${chatData[id].name}</span><span class="time"></span></div>
          <div class="preview">${preview}</div>
        </div>
      `;
      clist.appendChild(item);
      refreshSidebarTime(id);
    });
    // Reorder to match saved order
    savedOrder.forEach(id => {
      const item = document.querySelector(`.wx-chat-item[data-id="${id}"]`);
      if (item) clist.appendChild(item);
    });
  } catch(e) {}
}

function renderContacts(filter) {
  const list = document.getElementById('wxContactList');
  const q = (filter || '').toLowerCase();
  if (!q) {
    list.innerHTML = '<div class="wx-contact-empty">在上方搜索框输入账号<br>查找并添加好友</div>';
    return;
  }
  const matches = contactsData.filter(c => {
    return c.account.toLowerCase() === q;
  });
  if (matches.length === 0) {
    list.innerHTML = '<div class="wx-contact-empty">暂无联系人</div>';
    return;
  }
  list.innerHTML = matches.map(c => `
    <div class="wx-contact-item" data-name="${c.name}" data-account="${c.account}" onclick="showContactDetail('${c.id}')">
      <div class="avatar" style="${c.avatar.startsWith('#') ? 'background:'+c.avatar : bgImage(c.avatar)};">${c.avatar.startsWith('#') ? c.letter : ''}</div>
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="desc">账号：${c.account} · ${c.status}</div>
      </div>
      <button class="add-btn${c.friendStatus !== 'none' ? ' done' : ''}" data-id="${c.id}" onclick="event.stopPropagation();toggleAddFriend(this, '${c.id}')">${c.friendStatus === 'none' ? '添加' : c.friendStatus === 'pending' ? '等待验证' : '已添加'}</button>
    </div>
  `).join('');
}

function selectChat(id) {
  if (id === currentChat && document.getElementById('wxMain').style.display !== 'none') return;
  currentChat = id;
  document.querySelectorAll('.wx-chat-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.wx-chat-item[data-id="${id}"]`);
  if (item) item.classList.add('active');

  const data = chatData[id];
  if (!data) {
    clearSelectedChat();
    return;
  }
  document.getElementById('wxChatName').textContent = data.name;
  document.getElementById('wxChatStatus').textContent = data.status || '';
  // Track contact detail for chat header click
  currentDetailContactId = contactsData.find(c => c.id === id) ? id : null;

  const body = document.getElementById('wxChatBody');
  body.innerHTML = '';
  let lastRealTs = 0;
  data.messages.forEach(m => {
    // Time separator: show when there's a 5+ minute gap
    if (m.ts && m.type !== 'warn' && m.type !== 'notice' && (lastRealTs === 0 || m.ts - lastRealTs > 300000)) {
      const sep = document.createElement('div');
      sep.className = 'wx-time-sep';
      sep.textContent = formatTimeSeparator(m.ts);
      body.appendChild(sep);
      lastRealTs = m.ts;
    }
    if (m.type === 'warn' || m.type === 'notice') {
      const warnDiv = document.createElement('div');
      warnDiv.style.cssText = m.type === 'notice'
        ? 'text-align:center;font-size:12px;color:#9aa4a3;padding:4px 0;'
        : 'text-align:center;font-size:12px;color:#e8706a;padding:4px 0;';
      warnDiv.textContent = m.text;
      body.appendChild(warnDiv);
      return;
    }
    const isIn = m.type === 'in';
    const msgDiv = document.createElement('div');
    msgDiv.className = `wx-msg ${m.type}`;
    const avatarStyle = isIn ? (data.avatar.startsWith('#') ? `background:${data.avatar}` : bgImage(data.avatar)) : outgoingAvatarStyle();
    msgDiv.innerHTML = isIn ? `
      <div class="avatar" style="${avatarStyle};">${data.avatar.startsWith('#') ? data.letter : ''}</div>
      <div class="bubble">${m.text}</div>
    ` : `
      <div class="bubble">${m.text}</div>
      <div class="avatar" style="${avatarStyle};"></div>
    `;
    body.appendChild(msgDiv);
  });
  body.scrollTop = body.scrollHeight;

  document.getElementById('wxMain').style.display = '';
  document.getElementById('wxDetail').classList.remove('show');
  document.getElementById('wxContacts').classList.remove('show');
}

function sendWxMsg() {
  if (!currentChat || !chatData[currentChat]) {
    alert('请先选择一个会话。');
    return;
  }
  const input = document.getElementById('wxMsgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const body = document.getElementById('wxChatBody');
  const data = chatData[currentChat];
  const timeStr = currentTime();
  const nowTs = getStoryNow().getTime();

  // Check if we need a time separator
  const prevReal = [...data.messages].reverse().find(m => m.ts && m.type !== 'warn');
  const needSep = !prevReal || nowTs - prevReal.ts > 300000;

  // Save message first
  data.messages.push({ type: 'out', text, time: timeStr, ts: nowTs });
  saveChatData();
  moveChatToTop(currentChat);

  if (needSep) {
    const sep = document.createElement('div');
    sep.className = 'wx-time-sep';
    sep.textContent = formatTimeSeparator(nowTs);
    body.appendChild(sep);
  }
  const msgDiv = document.createElement('div');
  msgDiv.className = 'wx-msg out';
  msgDiv.innerHTML = `<div class="bubble">${text}</div><div class="avatar" style="${outgoingAvatarStyle()}"></div>`;
  body.appendChild(msgDiv);
  body.scrollTop = body.scrollHeight;

  // Then check friendship — message goes through first, warning shown after
  const friendCheck = contactsData.find(c => c.id === currentChat);
  if (friendCheck && friendCheck.friendStatus !== 'added') {
    // Save warning as a persistent message
    data.messages.push({ type: 'warn', text: '⚠ 还不是对方好友，请先添加好友', ts: getStoryNow().getTime() });
    saveChatData();
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'text-align:center;font-size:12px;color:#e8706a;padding:4px 0;';
    errDiv.textContent = '⚠ 还不是对方好友，请先添加好友';
    body.appendChild(errDiv);
    body.scrollTop = body.scrollHeight;
  }

  // Update chat list preview and time
  const preview = document.querySelector(`.wx-chat-item[data-id="${currentChat}"] .preview`);
  if (preview) preview.textContent = text.substring(0, 18) + (text.length > 18 ? '...' : '');
  refreshSidebarTime(currentChat);

  // Auto reply from kefu
  if (currentChat === 'kefu') {
    document.getElementById('wxSendBtn').disabled = true;
    const delay = 600 + Math.random() * 2000;
    setTimeout(() => {
      const reply = document.createElement('div');
      reply.className = 'wx-msg in';
      const rtimeStr = currentTime();
      const isKeyReply = text === '02#56741';
      const replyText = isKeyReply
        ? '已找到您的账号记录。初始私人密钥为：<b>1qaz2wsx</b>，请妥善保管。'
        : '抱歉，我们未能找到匹配的记录。请确认账号是否正确。';
      const plainText = isKeyReply ? '已找到您的账号记录。初始私人密钥为：1qaz2wsx，请妥善保管。' : replyText;
      // Save reply
      chatData.kefu.messages.push({ type: 'in', text: replyText, time: rtimeStr, ts: getStoryNow().getTime() });
      saveChatData();
      moveChatToTop('kefu');
      const kav = chatData.kefu.avatar;
      const kavStyle = kav.startsWith('#') ? 'background:'+kav : bgImage(kav);
      reply.innerHTML = `<div class="avatar" style="${kavStyle};"></div><div class="bubble">${replyText}</div>`;
      body.appendChild(reply);
      body.scrollTop = body.scrollHeight;

      const kefuPreview = document.querySelector('.wx-chat-item[data-id="kefu"] .preview');
      if (kefuPreview) kefuPreview.textContent = plainText.substring(0, 18) + (plainText.length > 18 ? '...' : '');

      document.getElementById('wxSendBtn').disabled = false;
    }, delay);
  }
}

function switchPanel(panel) {
  const main = document.getElementById('wxMain');
  const contacts = document.getElementById('wxContacts');
  const detail = document.getElementById('wxDetail');

  if (panel === 'chat') {
    main.style.display = '';
    contacts.classList.remove('show');
    detail.classList.remove('show');
    if (!currentChat) clearSelectedChat();
  } else if (panel === 'contacts') {
    main.style.display = 'none';
    contacts.classList.add('show');
    detail.classList.remove('show');
    renderContacts('');
  }
}

function moveChatToTop(id) {
  const item = document.querySelector(`.wx-chat-item[data-id="${id}"]`);
  const list = document.getElementById('wxChatList');
  if (item && list.firstChild !== item) {
    list.prepend(item);
    saveSidebar();
  }
}

  contact.friendStatus = 'pending';

          <div style="width:40px;height:40px;border-radius:4px;${p.avatar.startsWith('#') ? 'background:'+p.avatar : bgImage(p.avatar)};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;">${p.avatar.startsWith('#') ? (p.letter || p.user.slice(0,1)) : ''}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;color:#576b95;font-weight:500;margin-bottom:4px;">${p.user}</div>
            <div style="font-size:14px;color:#333;line-height:1.7;word-break:break-word;text-align:justify;">${p.text}</div>
            ${p.photos && p.photos.length > 0 ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${p.photos.map(ph => `<div style="border-radius:4px;overflow:hidden;border:1px solid #eee;width:160px;height:160px;flex-shrink:0;"><img src="${imgUrl(ph)}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`).join('')}</div>` : ''}
            ${p.link ? `<div onclick="window.open('${p.link.url}','_blank')" style="margin-top:8px;border:1px solid #e6e6e6;border-radius:4px;overflow:hidden;cursor:pointer;background:#fafafa;display:flex;align-items:center;gap:10px;padding:10px 12px;">
              <div style="width:36px;height:36px;border-radius:4px;background:#e8edee;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#8a9a96;">&#9670;</div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;color:#405051;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.link.title}</div>
                <div style="font-size:11px;color:#a7b1b1;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.link.desc}</div>
              </div>
            </div>` : ''}
            <div style="font-size:11px;color:#b0b0b0;margin-top:8px;">${p.time}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('momentsModal').classList.add('show');
}

function toggleMenu() {
  document.getElementById('menuModal').classList.add('show');
}

function closeMenu() {
  document.getElementById('menuModal').classList.remove('show');
}

// Auto-resize textarea
document.getElementById('wxMsgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// Close menus on overlay click
document.querySelectorAll('.wx-modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
});

// Init chat UI after loading saved data
loadAccountState();
updateAccountUI();
refreshStaticImages();
loadChatData();
if (accountState.current === 'secondary') {
  if (!chatData.susu.messages.length) seedEmithAccount();
  enforceEmithContacts();
}
restoreSidebar();
if (accountState.current === 'secondary') addSidebarChat('susu');
['kefu','file','system','susu'].forEach(refreshSidebarTime);
clearSelectedChat();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残页 · 大厦倾倒</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
}
body {
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(17,21,24,0.2), rgba(5,6,7,0.86)),
    radial-gradient(circle at 50% 28%, rgba(125, 90, 72, 0.16), transparent 46%),
    #090b0d;
  color: #cfc6b4;
  font-family: "Songti SC", "SimSun", "Noto Serif SC", serif;
}

.scene {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 0;
  padding: clamp(12px, 2.4vmin, 26px);
  display: flex;
  align-items: center;
  justify-content: center;
  isolation: isolate;
}

.scan {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.scan {
  opacity: 0.12;
  background: repeating-linear-gradient(180deg, transparent 0, transparent 10px, rgba(255,255,255,0.035) 11px);
}

.eyes {
  position: absolute;
  left: 50%;
  top: 30%;
  width: min(62%, 520px);
  height: min(20%, 150px);
  transform: translate(-50%, -50%);
  opacity: 0;
  pointer-events: none;
  animation: eyesAppear 4.8s ease-out forwards;
}
.eye {
  position: absolute;
  top: 22%;
  width: 34%;
  height: 56%;
  border-radius: 50%;
  background:
    radial-gradient(ellipse at 50% 48%, rgba(238, 220, 177, 0.28) 0 5%, rgba(86, 30, 25, 0.42) 6% 11%, transparent 12%),
    radial-gradient(ellipse at center, rgba(224, 204, 158, 0.28), rgba(154, 77, 52, 0.14) 34%, transparent 68%);
  box-shadow: inset 0 0 18px rgba(232, 205, 151, 0.12), 0 0 34px rgba(180, 75, 48, 0.12);
}
.eye::before {
  content: "";
  position: absolute;
  left: 14%;
  right: 14%;
  top: 42%;
  height: 1px;
  background: rgba(216, 190, 145, 0.28);
  box-shadow: 0 0 12px rgba(216, 190, 145, 0.2);
}
.eye.left { left: 4%; transform: rotate(5deg) scaleX(1.18); }
.eye.right { right: 4%; transform: rotate(-5deg) scaleX(1.18); }
body.no-eyes .eyes { display: none; }

.tower {
  position: relative;
  width: min(94%, 920px);
  height: min(92%, 700px);
  max-height: 100%;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  align-items: end;
  text-shadow: 0 16px 30px rgba(0,0,0,0.48);
}

.structure {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 0;
  animation: quake 4.8s ease-in-out forwards;
}

.roof,
.floor,
.gate,
.ash {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.line {
  display: flex;
  justify-content: center;
  white-space: nowrap;
  line-height: 1.05;
  letter-spacing: 0.08em;
  text-shadow: 0 0 12px rgba(191, 157, 120, 0.18);
}

.line .warn {
  color: #d99b86;
  text-shadow: 0 0 18px rgba(210, 84, 54, 0.38);
}

.char {
  display: inline;
}

.roof {
  top: 0;
  width: 82%;
  color: #d6c7a8;
  font-size: clamp(12px, 3vmin, 30px);
  animation: roofFall 4.8s cubic-bezier(.22,.84,.25,1) forwards;
}
.roof .line:nth-child(2) { opacity: 0.9; transform: scaleX(0.94); }
.roof .line:nth-child(3) { opacity: 0.78; transform: scaleX(0.82); }

.floor {
  width: 64%;
  color: #bda98a;
  font-size: clamp(11px, 2.35vmin, 23px);
  opacity: 0.92;
}
.floor.one { top: 20%; animation: shearLeft 4.8s cubic-bezier(.22,.84,.25,1) forwards; }
.floor.two { top: 39%; width: 74%; animation: shearRight 4.8s cubic-bezier(.22,.84,.25,1) forwards; }
.floor.three { top: 58%; width: 82%; animation: sink 4.8s cubic-bezier(.22,.84,.25,1) forwards; }

.pillar {
  position: absolute;
  top: 25%;
  bottom: 19%;
  width: 8%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  color: #a8977d;
  font-size: clamp(11px, 2.25vmin, 22px);
}
.pillar.left { left: 20%; animation: pillarLeft 4.8s cubic-bezier(.22,.84,.25,1) forwards; }
.pillar.right { right: 20%; animation: pillarRight 4.8s cubic-bezier(.22,.84,.25,1) forwards; }
.pillar.mid { left: 50%; transform: translateX(-50%); opacity: 0.64; animation: pillarDrop 4.8s cubic-bezier(.22,.84,.25,1) forwards; }

.gate {
  bottom: 12%;
  width: 60%;
  color: #e0d5bd;
  font-size: clamp(12px, 2.75vmin, 27px);
  animation: gateBreak 4.8s cubic-bezier(.22,.84,.25,1) forwards;
}
.gate .line:first-child {
  font-weight: 700;
  letter-spacing: 0.22em;
}

.fall {
  position: absolute;
  left: var(--x);
  top: var(--y);
  color: var(--c, #bda98a);
  font-size: clamp(11px, 2.2vmin, 20px);
  opacity: 0;
  transform: rotate(var(--r)) translateY(-20px);
  animation: debris 4.8s cubic-bezier(.22,.84,.25,1) forwards;
  animation-delay: var(--d);
  text-shadow: 0 0 10px rgba(228, 202, 156, 0.22);
}

.fall.big {
  font-size: clamp(16px, 3.7vmin, 38px);
  color: #dcc89f;
  text-shadow: 0 0 18px rgba(218, 125, 83, 0.42);
}

.dust {
  position: absolute;
  left: var(--x);
  bottom: var(--b);
  width: var(--w);
  height: var(--h);
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(219, 199, 166, 0.18), rgba(219, 199, 166, 0.04) 42%, transparent 72%);
  opacity: 0;
  transform: translateX(-50%) scale(0.35);
  animation: dust 4.8s ease-out forwards;
  animation-delay: var(--d);
}

.crack {
  position: absolute;
  top: 15%;
  width: 1px;
  height: 58%;
  background: linear-gradient(180deg, transparent, rgba(221, 174, 121, 0.42), rgba(162, 58, 42, 0.18), transparent);
  opacity: 0;
  transform-origin: top;
  animation: crack 4.8s ease-in-out forwards;
}
.crack.left { left: 37%; transform: rotate(-18deg); }
.crack.right { right: 34%; transform: rotate(14deg); animation-delay: 0.35s; }
.crack.mid { left: 51%; height: 68%; transform: rotate(3deg); animation-delay: 0.7s; }

.impact {
  position: absolute;
  left: 50%;
  bottom: 10%;
  width: 56%;
  height: 18%;
  border-radius: 50%;
  transform: translateX(-50%) scaleX(1);
  background: radial-gradient(ellipse at center, rgba(214, 184, 134, 0.18), transparent 64%);
  opacity: 0;
  animation: impact 4.8s ease-out forwards;
}

.ash {
  bottom: 0;
  width: 86%;
  min-height: clamp(40px, 8vmin, 64px);
  color: rgba(235, 229, 211, 0.9);
  font-size: clamp(10px, 2vmin, 20px);
  opacity: 0.92;
  animation: ashRise 4.8s ease-out forwards;
}
.ash .line {
  justify-content: space-around;
}
.ash .line:nth-child(2) { opacity: 0.62; transform: scaleX(1.08); }
.ash .line:nth-child(3) { opacity: 0.36; transform: scaleX(1.22); }

body.settled .scan,
body.settled .structure,
body.settled .roof,
body.settled .floor,
body.settled .pillar,
body.settled .gate,
body.settled .fall,
body.settled .dust,
body.settled .crack,
body.settled .impact,
body.settled .ash,
body.settled .eyes {
  animation: none !important;
}
body.settled .structure { transform: translate(0, 18px); opacity: 0.88; }
body.settled .eyes { opacity: 0.24; transform: translate(-50%, -50%) scale(1); }
body.settled .roof { transform: translateX(-31%) translateY(40vmin) rotate(-31deg) scaleX(0.92); opacity: 0.55; }
body.settled .floor.one { transform: translateX(-85%) translateY(25vmin) skewX(-24deg) rotate(-18deg); opacity: 0.34; }
body.settled .floor.two { transform: translateX(-7%) translateY(28vmin) skewX(28deg) rotate(20deg); opacity: 0.31; }
body.settled .floor.three { transform: translateX(-52%) translateY(31vmin) scaleY(0.18) scaleX(1.28); opacity: 0.23; }
body.settled .pillar.left { transform: translate(-21vmin, 30vmin) rotate(-72deg); opacity: 0.25; }
body.settled .pillar.right { transform: translate(21vmin, 30vmin) rotate(72deg); opacity: 0.25; }
body.settled .pillar.mid { transform: translateX(-50%) translateY(32vmin) scaleY(0.16); opacity: 0.13; }
body.settled .gate { transform: translateX(-51%) translateY(20vmin) scaleX(0.46) scaleY(0.42) skewX(18deg); opacity: 0.28; }
body.settled .fall { opacity: 0.72; transform: rotate(calc(var(--r) * 2.8)) translateY(var(--fall)) translateX(var(--drift, 0)); }
body.settled .dust { opacity: 0.28; transform: translateX(-50%) scale(1.55); }
body.settled .crack { opacity: 0.3; height: 82%; }
body.settled .impact { opacity: 0.38; transform: translateX(-50%) scaleX(1.7) scaleY(0.78); }
body.settled .ash { opacity: 0.96; transform: translateX(-50%) translateY(-4px); }

@keyframes quake {
  0%, 32% { transform: translate(0,0); opacity: 1; }
  36% { transform: translate(-3px, 1px); }
  38% { transform: translate(4px, -2px); }
  40% { transform: translate(-5px, 0); opacity: 1; }
  43% { transform: translate(4px, 3px); }
  46% { transform: translate(-2px, -3px); }
  52% { transform: translate(2px, 1px); }
  100% { transform: translate(0, 18px); opacity: 0.88; }
}

@keyframes roofFall {
  0%, 28% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 1; }
  38% { transform: translateX(-50%) translateY(8px) rotate(-2deg); opacity: 1; }
  56% { transform: translateX(-42%) translateY(25vmin) rotate(-18deg); opacity: 0.9; }
  100% { transform: translateX(-31%) translateY(40vmin) rotate(-31deg) scaleX(0.92); opacity: 0.55; }
}
@keyframes shearLeft {
  0%, 31% { transform: translateX(-50%) translateY(0) skewX(0deg) rotate(0deg); opacity: 0.92; }
  48% { transform: translateX(-70%) translateY(9vmin) skewX(-18deg) rotate(-9deg); opacity: 0.72; }
  100% { transform: translateX(-85%) translateY(25vmin) skewX(-24deg) rotate(-18deg); opacity: 0.34; }
}
@keyframes shearRight {
  0%, 33% { transform: translateX(-50%) translateY(0) skewX(0deg) rotate(0deg); opacity: 0.9; }
  50% { transform: translateX(-24%) translateY(12vmin) skewX(20deg) rotate(11deg); opacity: 0.7; }
  100% { transform: translateX(-7%) translateY(28vmin) skewX(28deg) rotate(20deg); opacity: 0.31; }
}
@keyframes sink {
  0%, 34% { transform: translateX(-50%) translateY(0) scaleY(1); opacity: 0.9; }
  52% { transform: translateX(-50%) translateY(18vmin) scaleY(0.42) scaleX(1.12); opacity: 0.56; }
  100% { transform: translateX(-52%) translateY(31vmin) scaleY(0.18) scaleX(1.28); opacity: 0.23; }
}
@keyframes pillarLeft {
  0%, 34% { transform: rotate(0deg); opacity: 1; }
  54% { transform: translate(-12vmin, 14vmin) rotate(-36deg); opacity: 0.6; }
  100% { transform: translate(-21vmin, 30vmin) rotate(-72deg); opacity: 0.25; }
}
@keyframes pillarRight {
  0%, 34% { transform: rotate(0deg); opacity: 1; }
  54% { transform: translate(12vmin, 14vmin) rotate(36deg); opacity: 0.6; }
  100% { transform: translate(21vmin, 30vmin) rotate(72deg); opacity: 0.25; }
}
@keyframes pillarDrop {
  0%, 35% { transform: translateX(-50%) translateY(0) scaleY(1); opacity: 0.64; }
  52% { transform: translateX(-50%) translateY(19vmin) scaleY(0.5); opacity: 0.34; }
  100% { transform: translateX(-50%) translateY(32vmin) scaleY(0.16); opacity: 0.13; }
}
@keyframes gateBreak {
  0%, 36% { transform: translateX(-50%) translateY(0) scaleX(1); opacity: 1; }
  48% { transform: translateX(-50%) translateY(6vmin) scaleX(1.2) skewX(-10deg); opacity: 0.78; }
  100% { transform: translateX(-51%) translateY(20vmin) scaleX(0.46) scaleY(0.42) skewX(18deg); opacity: 0.28; }
}
@keyframes debris {
  0%, 28% { opacity: 0; transform: rotate(var(--r)) translateY(-20px) translateX(0); }
  36% { opacity: 1; }
  100% { opacity: 0.72; transform: rotate(calc(var(--r) * 2.8)) translateY(var(--fall)) translateX(var(--drift, 0)); }
}
@keyframes crack {
  0%, 30% { opacity: 0; transform-origin: top; }
  38% { opacity: 0.86; }
  100% { opacity: 0.3; height: 82%; }
}
@keyframes impact {
  0%, 40% { opacity: 0; transform: translateX(-50%) scaleX(0.7); }
  52% { opacity: 1; transform: translateX(-50%) scaleX(1.18); }
  100% { opacity: 0.38; transform: translateX(-50%) scaleX(1.7) scaleY(0.78); }
}
@keyframes dust {
  0%, 42% { opacity: 0; transform: translateX(-50%) scale(0.35); }
  58% { opacity: 0.62; transform: translateX(-50%) scale(1.05); }
  100% { opacity: 0.28; transform: translateX(-50%) scale(1.55); }
}
@keyframes ashRise {
  0%, 42% { opacity: 0.72; transform: translateX(-50%) translateY(0); }
  66% { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  100% { opacity: 0.96; transform: translateX(-50%) translateY(-4px); }
}
@keyframes eyesAppear {
  0%, 58% { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
  78% { opacity: 0.32; }
  100% { opacity: 0.24; transform: translate(-50%, -50%) scale(1); }
}
@media (max-width: 720px) {
  .scene { padding: 12px; }
  .tower { width: 96%; height: 92%; }
  .eyes { width: 72%; top: 28%; }
  .line { letter-spacing: 0.03em; }
  .roof { font-size: clamp(10px, 2.45vmin, 18px); width: 88%; }
  .pillar.left { left: 18%; }
  .pillar.right { right: 18%; }
  .floor { width: 84%; font-size: clamp(9px, 2vmin, 15px); }
  .floor.two { width: 88%; }
  .floor.three { width: 92%; }
  .gate { width: 76%; font-size: clamp(10px, 2.25vmin, 17px); }
  .pillar { font-size: clamp(9px, 1.9vmin, 15px); }
  .fall { --drift: 0px !important; font-size: clamp(9px, 1.85vmin, 14px); }
  .fall.big { font-size: clamp(12px, 2.65vmin, 22px); }
  body.settled .roof { transform: translateX(-40%) translateY(34vmin) rotate(-24deg) scaleX(0.86); }
  body.settled .floor.one { transform: translateX(-64%) translateY(21vmin) skewX(-16deg) rotate(-12deg); }
  body.settled .floor.two { transform: translateX(-35%) translateY(24vmin) skewX(18deg) rotate(13deg); }
  body.settled .floor.three { transform: translateX(-51%) translateY(28vmin) scaleY(0.18) scaleX(1.05); }
  body.settled .pillar.left { transform: translate(-12vmin, 26vmin) rotate(-58deg); }
  body.settled .pillar.right { transform: translate(12vmin, 26vmin) rotate(58deg); }
  body.settled .pillar.mid { transform: translateX(-50%) translateY(29vmin) scaleY(0.16); }
  body.settled .gate { transform: translateX(-50%) translateY(17vmin) scaleX(0.5) scaleY(0.42) skewX(12deg); }
  @keyframes roofFall {
    0%, 28% { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 1; }
    56% { transform: translateX(-45%) translateY(22vmin) rotate(-15deg); opacity: 0.9; }
    100% { transform: translateX(-40%) translateY(34vmin) rotate(-24deg) scaleX(0.86); opacity: 0.55; }
  }
  @keyframes shearLeft {
    0%, 31% { transform: translateX(-50%) translateY(0) skewX(0deg) rotate(0deg); opacity: 0.92; }
    48% { transform: translateX(-58%) translateY(8vmin) skewX(-13deg) rotate(-7deg); opacity: 0.72; }
    100% { transform: translateX(-64%) translateY(21vmin) skewX(-16deg) rotate(-12deg); opacity: 0.34; }
  }
  @keyframes shearRight {
    0%, 33% { transform: translateX(-50%) translateY(0) skewX(0deg) rotate(0deg); opacity: 0.9; }
    50% { transform: translateX(-41%) translateY(10vmin) skewX(14deg) rotate(8deg); opacity: 0.7; }
    100% { transform: translateX(-35%) translateY(24vmin) skewX(18deg) rotate(13deg); opacity: 0.31; }
  }
  @keyframes sink {
    0%, 34% { transform: translateX(-50%) translateY(0) scaleY(1); opacity: 0.9; }
    52% { transform: translateX(-50%) translateY(16vmin) scaleY(0.42) scaleX(1.05); opacity: 0.56; }
    100% { transform: translateX(-51%) translateY(28vmin) scaleY(0.18) scaleX(1.05); opacity: 0.23; }
  }
  @keyframes pillarLeft {
    0%, 34% { transform: rotate(0deg); opacity: 1; }
    54% { transform: translate(-8vmin, 12vmin) rotate(-32deg); opacity: 0.6; }
    100% { transform: translate(-12vmin, 26vmin) rotate(-58deg); opacity: 0.25; }
  }
  @keyframes pillarRight {
    0%, 34% { transform: rotate(0deg); opacity: 1; }
    54% { transform: translate(8vmin, 12vmin) rotate(32deg); opacity: 0.6; }
    100% { transform: translate(12vmin, 26vmin) rotate(58deg); opacity: 0.25; }
  }
  @keyframes pillarDrop {
    0%, 35% { transform: translateX(-50%) translateY(0) scaleY(1); opacity: 0.64; }
    52% { transform: translateX(-50%) translateY(17vmin) scaleY(0.5); opacity: 0.34; }
    100% { transform: translateX(-50%) translateY(29vmin) scaleY(0.16); opacity: 0.13; }
  }
  @keyframes gateBreak {
    0%, 36% { transform: translateX(-50%) translateY(0) scaleX(1); opacity: 1; }
    48% { transform: translateX(-50%) translateY(5vmin) scaleX(1.1) skewX(-8deg); opacity: 0.78; }
    100% { transform: translateX(-50%) translateY(17vmin) scaleX(0.5) scaleY(0.42) skewX(12deg); opacity: 0.28; }
  }
}

@media (max-height: 560px) {
  .tower { width: 98%; height: 96%; }
  .roof { font-size: clamp(10px, 2.6vmin, 20px); }
  .floor { font-size: clamp(9px, 2.05vmin, 17px); }
  .pillar { font-size: clamp(9px, 1.95vmin, 16px); }
  .gate { font-size: clamp(10px, 2.2vmin, 18px); }
  .fall { font-size: clamp(9px, 1.9vmin, 15px); }
  .fall.big { font-size: clamp(12px, 2.8vmin, 24px); }
  .ash { font-size: clamp(9px, 1.8vmin, 16px); min-height: 36px; }
}
</style>
</head>
<body>
<div class="scene">
  <div class="scan"></div>
  <div class="eyes" aria-hidden="true">
    <div class="eye left"></div>
    <div class="eye right"></div>
  </div>

  <div class="tower" aria-label="文字组成的贾府崩塌画面">
    <div class="structure">
      <div class="roof">
        <div class="line">雕梁画栋朱门绣户钟鸣鼎食金玉满堂</div>
        <div class="line">烈火烹油鲜花着锦簪缨旧族富贵百年</div>
        <div class="line">大观园春宴联诗省亲灯影繁华梦里</div>
      </div>

      <div class="floor one">
        <div class="line">荣国宁国贾史王薛花柳繁华地温柔富贵乡</div>
        <div class="line">金陵旧梦钟鼓未歇朱楼先斜</div>
      </div>

      <div class="floor two">
        <div class="line">抄检大观园家人相疑门户自<span class="warn">裂</span></div>
        <div class="line">百足之虫死而不僵须从家里<span class="warn">自杀自灭</span></div>
      </div>

      <div class="floor three">
        <div class="line">忽喇喇似<span class="warn">大厦倾</span>昏惨惨似灯将尽</div>
        <div class="line">食尽鸟投林落了片白茫茫大地真干净</div>
      </div>

      <div class="crack left"></div>
      <div class="crack right"></div>
      <div class="crack mid"></div>
      <div class="impact"></div>
      <div class="dust" style="--x:42%;--b:8%;--w:48%;--h:16%;--d:1.8s;"></div>
      <div class="dust" style="--x:58%;--b:6%;--w:54%;--h:18%;--d:2.1s;"></div>
      <div class="dust" style="--x:50%;--b:14%;--w:72%;--h:24%;--d:2.4s;"></div>

      <div class="pillar left">
        <span>荣</span><span>华</span><span>富</span><span>贵</span><span>尽</span>
      </div>
      <div class="pillar mid">
        <span>朱</span><span>门</span><span>旧</span><span>梦</span><span>空</span>
      </div>
      <div class="pillar right">
        <span>盛</span><span>筵</span><span>终</span><span>须</span><span>散</span>
      </div>

      <div class="gate">
        <div class="line">贾　府</div>
        <div class="line">朱门未闭　尘已先入</div>
      </div>

      <span class="fall big" style="--x:18%;--y:22%;--r:-19deg;--d:.2s;--fall:360px;--drift:-110px;">荣</span>
      <span class="fall big" style="--x:72%;--y:18%;--r:13deg;--d:.4s;--fall:390px;--drift:120px;">宁</span>
      <span class="fall" style="--x:38%;--y:30%;--r:-8deg;--d:.7s;--fall:330px;--drift:-60px;">簪</span>
      <span class="fall" style="--x:62%;--y:34%;--r:22deg;--d:.9s;--fall:340px;--drift:70px;">缨</span>
      <span class="fall big" style="--x:28%;--y:48%;--r:31deg;--d:1.1s;--fall:300px;--drift:-92px;">玉</span>

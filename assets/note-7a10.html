<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作者瞎扯环节</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; margin: 0; }
body {
  background:
    radial-gradient(circle at 18% 12%, rgba(155, 216, 189, .16), transparent 34%),
    radial-gradient(circle at 86% 82%, rgba(120, 136, 128, .1), transparent 32%),
    #f4f6f3;
  color: #202725;
  font: 15px/2 "Microsoft YaHei", "PingFang SC", sans-serif;
}
.page {
  width: min(700px, calc(100vw - 34px));
  margin: 0 auto;
  padding: 64px 0 72px;
}
@media (max-width: 480px) {
  .page { padding: 36px 0 48px; }
  body { font-size: 14px; line-height: 1.8; }
  h1 { margin-bottom: 16px; }
  .card { padding: 20px 0 24px; }
  p { margin-bottom: 12px; }
  .qr-block { margin-top: 20px; }
  .qr-block img { width: min(160px, 50vw); }
}
h1 {
  margin: 0 0 22px;
  color: #1d2a25;
  font: 400 clamp(34px, 7vw, 64px)/1.2 "Songti SC", SimSun, serif;
  letter-spacing: 4px;
}
.card {
  border-top: 1px solid rgba(94, 128, 112, .32);
  border-bottom: 1px solid rgba(94, 128, 112, .18);
  padding: 28px 0 34px;
}
p {
  margin: 0 0 15px;
}
.qr-block {
  margin-top: 28px;
  display: flex;
  justify-content: center;
}
.qr-block img {
  display: block;
  width: min(220px, 58vw);
  height: auto;
  border: 1px solid rgba(94, 128, 112, .22);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 18px 42px rgba(26, 37, 33, .1);
}
</style>
<link rel="stylesheet" href="mobile-fix.css">
</head>
<body>
<main class="page">
  <h1>作者瞎扯环节</h1>
  <section class="card">
    <p>感谢你走到这里。</p>
    <p>这是我的第一部做完的游戏，恭喜各位通关！</p>
    <p>本游戏的灵感来自于五月份在北京举行的pku城市定向，当时对于地图、塔罗牌的设计有很多想法，不过做下来实在一般，请大家多多包涵吧！</p>
    <p>感谢gpt、claude、deepseek、豆包对我的大力帮助。</p>
    <p>感谢一些朋友对于谜题设计的帮助。</p>
    <p>感谢剪映会员的限时6元优惠。</p>
    <p>感谢结局5的bgm「僕は僕じゃない僕であって僕じゃ」，这是来自煉狱庭園的无版权音乐。</p>
    <p>感谢你走到这里。</p>
    <p>辛苦了！</p>
    <div class="qr-block">
      <img src="xiaohongshu-qr.jpg" alt="Emith 小红书二维码">
    </div>
  </section>
</main>
</body>
</html>

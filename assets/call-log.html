<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通话记录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #20272c;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  justify-content: center;
  padding: 12px 0;
}

.phone {
  width: 300px;
  height: 540px;
  background: #f2f2f6;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-self: flex-start;
}

.top-bar {
  background: #fff;
  padding: 12px 16px 10px;
  border-bottom: 0.5px solid #d9d9d9;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 600;
  color: #111;
}
.top-bar .edit {
  font-size: 14px;
  color: #007aff;
}

.tabs {
  display: flex;
  background: #fff;
  padding: 0 16px;
  gap: 20px;
  border-bottom: 0.5px solid #d9d9d9;
}
.tabs .tab {
  padding: 8px 0;
  font-size: 13px;
  color: #8a8a8a;
  border-bottom: 2px solid transparent;
}
.tabs .tab.active {
  color: #007aff;
  border-bottom-color: #007aff;
}

.call-list {
  flex: 1;
  background: #fff;
}
.call-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 0.5px solid #e8e8ed;
  gap: 12px;
}
.call-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.call-icon svg {
  width: 18px; height: 18px;
  opacity: 0.5;
}
.call-icon.incoming { background: #e8f5e9; }
.call-icon.incoming svg { fill: #2e7d32; }
.call-icon.missed { background: #fce4ec; }
.call-icon.missed svg { fill: #c62828; }

.call-info {
  flex: 1;
  min-width: 0;
}
.call-name {
  font-size: 15px;
  color: #111;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.call-name.missed-text {
  color: #c62828;
}
.call-meta {
  font-size: 11px;
  color: #8a8a8a;
  margin-top: 1px;
}
.call-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  margin-right: 5px;
}
.call-badge.incoming { background: #e8f5e9; color: #2e7d32; }
.call-badge.outgoing { background: #e3f2fd; color: #1565c0; }
.call-badge.missed { background: #fce4ec; color: #c62828; }

.call-time {
  font-size: 12px;
  color: #8a8a8a;
  text-align: right;
  flex-shrink: 0;
}

.download-bar {
  padding: 10px 16px;
  background: #f2f2f6;
  border-top: 0.5px solid #d9d9d9;
}
.download-btn {
  width: 100%;
  padding: 10px;
  background: #fff;
  border: 0.5px solid #c8c8cc;
  border-radius: 8px;
  color: #007aff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  display: block;
  text-decoration: none;
}
.download-btn:hover { background: #f0f0f5; }
.download-btn.disabled {
  color: #c8c8cc;
  cursor: not-allowed;
  background: #f9f9f9;
  pointer-events: none;
}
.download-btn.disabled:hover { background: #f9f9f9; }
.download-btn { border: none; font-family: inherit; font-size: 13px; font-weight: 500; }

.call-item { cursor: pointer; }
.call-item:hover { background: #e8e8ed; }
.call-item.checked { background: #e8f5e9; }

.footer-note {
  text-align: center;
  font-size: 10px;
  color: #8a8a8a;
  padding: 4px 16px 8px;
  background: #f2f2f6;
}

</style>
</head>
<body>

var lastCallChecked = false;

function clickCall(index) {
  var items = document.querySelectorAll('.call-item');
  var btn = document.getElementById('downloadBtn');
  items.forEach(function(el) { el.classList.remove('checked'); });
  if (index === 2) {
    lastCallChecked = true;
    document.getElementById('lastCall').classList.add('checked');
    btn.classList.remove('disabled');
  } else {
    btn.classList.add('disabled');
    items[index].classList.add('checked');
  }
}

document.getElementById("downloadBtn").addEventListener("click", function() {
  var binary = atob(MP3_B64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  var blob = new Blob([bytes], { type: 'audio/mpeg' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "incoming-call.mp3";
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
});

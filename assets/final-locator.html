<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定位残留</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #101615;
  color: #dfe9e5;
  font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
  display: grid;
  place-items: center;
  padding: 18px;
}
.tracker {
  width: min(760px, 100%);
  border: 1px solid #263d39;
  background: #16211f;
  box-shadow: 0 18px 54px rgba(0,0,0,.32), inset 0 0 0 1px rgba(255,255,255,.03);
}
.top {
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #263d39;
  background: #111a18;
  color: #94aaa3;
  font-size: 12px;
  letter-spacing: 1px;
}
.badge {
  color: #d5e2df;
  font-weight: 600;
}
.screen {
  position: relative;
  min-height: 420px;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(145,174,166,.055) 1px, transparent 1px),
    linear-gradient(rgba(145,174,166,.055) 1px, transparent 1px),
    radial-gradient(circle at 55% 45%, rgba(75,134,119,.18), transparent 36%),
    #13201d;
  background-size: 34px 34px, 34px 34px, auto, auto;
}
.screen::before {
  content: "";
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(133, 163, 154, .18);
  pointer-events: none;
}
.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(rgba(255,255,255,.025) 50%, rgba(0,0,0,.018) 50%);
  background-size: 100% 4px;
  mix-blend-mode: screen;
  opacity: .45;
}
.point {
  position: absolute;
  left: 57%;
  top: 48%;
  width: 18px;
  height: 18px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: #f1efe2;
  box-shadow: 0 0 0 7px rgba(224, 63, 78, .12), 0 0 34px rgba(224,63,78,.52);
  z-index: 2;
}
.point::before,
.point::after {
  content: "";
  position: absolute;
  inset: -18px;
  border: 1px solid rgba(224, 63, 78, .62);
  border-radius: 50%;
  animation: pulse 2.4s ease-out infinite;
}
.point::after { animation-delay: .85s; }
.label {
  position: absolute;
  left: calc(57% + 28px);
  top: calc(48% - 24px);
  z-index: 3;
  min-width: 210px;
  border: 1px solid #46635d;
  background: rgba(15, 25, 23, .94);
  padding: 12px 14px;
  box-shadow: 0 12px 26px rgba(0,0,0,.26);
}
.label .small {
  color: #8da69f;
  font: 11px/1.5 "Courier New", monospace;
  letter-spacing: 1.5px;
}
.label .place {
  margin-top: 4px;
  color: #f0f4ef;
  font-size: 22px;
  line-height: 1.35;
  font-weight: 700;
  letter-spacing: 2px;
}
.label .time {
  margin-top: 8px;
  color: #c25d61;
  font-size: 12px;
  letter-spacing: 1px;
}
.coords {
  position: absolute;
  left: 24px;
  bottom: 22px;
  color: #718c84;
  font: 11px/1.8 "Courier New", monospace;
  letter-spacing: 1px;
  z-index: 3;
}
.foot {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 16px;
  border-top: 1px solid #263d39;
  color: #6f8780;
  font: 11px/1.6 "Courier New", monospace;
  background: #111a18;
}
@keyframes pulse {
  0% { transform: scale(.4); opacity: .85; }
  100% { transform: scale(2.3); opacity: 0; }
}
@media (max-width: 620px) {
  body { padding: 10px; }
  .screen { min-height: 360px; }
  .point { left: 48%; top: 45%; }
  .label { left: 24px; right: 24px; top: 54%; min-width: 0; }
  .foot { flex-direction: column; gap: 4px; }
}
</style>
<link rel="stylesheet" href="mobile-fix.css">
<script src="mobile-fix.js" defer></script>
</head>
<body>
<main class="tracker">
  <div class="top">
    <span class="badge">定位残留</span>
    <span>DEVICE CACHE / DELAYED</span>
  </div>
  <section class="screen" aria-label="定位残留地图">
    <div class="point"></div>
    <div class="label">
      <div class="small">LAST FIXED POINT</div>
      <div class="place">平南市新步区</div>
      <div class="time">更新：1天前</div>
    </div>
    <div class="coords">SIGNAL DRIFT: LOW<br>ARCHIVE SOURCE: TRACKER UNIT</div>
  </section>
  <div class="foot">
    <span>只读缓存</span>
    <span>定位点未再更新</span>
  </div>
</main>
</body>
</html>
